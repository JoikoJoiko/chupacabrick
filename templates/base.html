{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}ChupaCare{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<div class="page">

    <header class="site-header">
        <a href="{% url 'main:index' %}" class="site-logo">
            <span>CHUPA</span>
            <span>CARE</span>
        </a>

        <nav class="site-nav">
            <a href="{% url 'main:index' %}">Главная</a>
            <a href="#">Войти</a>
            <a href="#">Регистрация</a>
        </nav>
    </header>

    <main class="site-main">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <span>♡ не забывай о себе ♡</span>
    </footer>

</div>
</body>
</html>
