{% extends 'base.html' %}
{% load static %}

{% block title %}Регистрация — ChupaCare{% endblock %}

{% block content %}
<section class="auth-screen">
    <div class="auth-card auth-card--register">
        <div class="tape tape--left"></div>
        <div class="tape tape--right"></div>

        <h1>Зарегистрироваться</h1>

        <form method="post" class="paper-form">
            {% csrf_token %}

            {% if form.non_field_errors %}
                <div class="form-errors">
                    {{ form.non_field_errors }}
                </div>
            {% endif %}

            <label>
                <span>Логин</span>
                {{ form.username }}
                {{ form.username.errors }}
            </label>

            <label>
                <span>Пароль</span>
                {{ form.password1 }}
                {{ form.password1.errors }}
            </label>

            <label>
                <span>Подтверждение пароля</span>
                {{ form.password2 }}
                {{ form.password2.errors }}
            </label>

            <button type="submit" class="paper-btn paper-btn--primary">Дальше</button>
        </form>

        <p class="auth-card__bottom">
            Уже знакомы с Чупакабриком?
            <a href="{% url 'main:login' %}">Войти</a>
        </p>
    </div>

<div class="auth-stickers">
    <div class="photo-sticker photo-sticker--auth-one">
        <img src="{% static sticker_images.0 %}" alt="Чупакабрик">
    </div>

    <div class="photo-sticker photo-sticker--auth-two">
        <img src="{% static sticker_images.1 %}" alt="Чупакабрик">
    </div>
</div>
</section>
{% endblock %}
